<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการรถ (Fleet Management)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        
        /* สกอร์บาร์ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* โหลดเดอร์ */
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* จัดให้เนื้อหาหลักเลื่อนได้ ไม่โดนตัด */
        .content-scroll {
            height: calc(100vh - 80px);
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* สำหรับ PIN Input */
        .pin-input {
            letter-spacing: 0.5em;
            font-size: 2.5rem;
        }
        .pin-input::placeholder {
            letter-spacing: normal;
            font-size: 1.125rem;
            font-weight: normal;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden relative">

    <!-- 🔒 หน้าจอใส่รหัส PIN (ซ้อนทับทุกอย่าง) -->
    <div id="pinOverlay" class="fixed inset-0 bg-slate-900/95 z-[9999] flex items-center justify-center p-4 backdrop-blur-md hidden">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <div class="mb-8">
                <div class="w-16 h-16 bg-rose-100 text-rose-800 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="lock" class="w-8 h-8"></i>
                </div>
                <h2 id="pinTitle" class="text-2xl font-bold text-slate-800">กรุณากรอกรหัส PIN</h2>
                <p id="pinSubtitle" class="text-slate-500 mt-2 text-sm">ระบุรหัส 4 หลักเพื่อเข้าใช้งาน</p>
            </div>
            <div class="mb-6">
                <input type="password" id="pinInput" inputmode="numeric" pattern="[0-9]*" maxlength="4"
                       class="pin-input w-full text-center font-bold text-slate-800 bg-slate-50 border-2 border-slate-200 rounded-xl py-4 focus:ring-2 focus:ring-rose-800 focus:border-rose-800 outline-none transition-all"
                       placeholder="กรอกรหัส 4 หลัก" oninput="handlePinInput(this.value)">
            </div>
            <button id="pinCancelBtn" onclick="cancelActionPin()" class="hidden w-full py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold text-slate-600 transition-colors mt-2">
                ยกเลิก
            </button>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shadow-sm flex-shrink-0 z-20">
        <div class="p-6 border-b border-slate-100 flex items-center space-x-3 flex-shrink-0">
            <div class="bg-rose-800 p-2 rounded-lg">
                <i data-lucide="layout-panel-left" class="h-6 w-6 text-white"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">ระบบจัดการรถ</h1>
        </div>
        <!-- เมนูหลักแบบ Tree View -->
        <nav class="flex-1 p-4 overflow-y-auto" id="nav-menu">
            <!-- สร้างผ่าน JS อัตโนมัติ -->
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 h-screen">
        <header class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center z-10 flex-shrink-0 shadow-sm">
            <h2 class="text-2xl font-bold text-slate-800 flex items-center">
                <span id="page-title">ภาพรวมผลประกอบการ</span>
                <span id="page-subtitle" class="ml-2 text-rose-800 text-lg font-medium hidden"></span>
            </h2>
            <div class="flex space-x-3">
                <button onclick="initApp()" class="flex items-center space-x-2 px-4 py-2 bg-white border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors shadow-sm font-medium">
                    <i data-lucide="refresh-cw" class="h-4 w-4 text-slate-500"></i>
                    <span>รีเฟรชข้อมูล</span>
                </button>
                <button id="btn-add-new" class="hidden items-center space-x-2 px-4 py-2 bg-rose-800 text-white rounded-lg hover:bg-rose-900 transition-colors shadow-sm font-medium">
                    <i data-lucide="plus-circle" class="h-4 w-4"></i>
                    <span>เพิ่มข้อมูลใหม่</span>
                </button>
            </div>
        </header>

        <div class="content-scroll relative" id="main-content">
            <div class="p-8">
                <div id="loading-spinner" class="absolute inset-0 bg-slate-50/80 z-50 flex flex-col items-center justify-center hidden">
                    <div class="spinner rounded-full h-12 w-12 border-b-2 border-rose-800 mb-4"></div>
                    <p class="text-slate-500 font-medium">กำลังโหลดข้อมูลจากฐานข้อมูล...</p>
                </div>
                <div id="tab-content" class="w-full"></div>
            </div>
        </div>
    </main>

    <!-- Main Modal (เพิ่ม/แก้ไข ข้อมูล) -->
    <div id="main-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 id="modal-title" class="text-lg font-bold text-slate-800">หัวข้อ</h3>
                <button id="btn-close-modal" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>
            <form id="main-form" class="p-6 space-y-4"></form>
        </div>
    </div>

    <!-- Map Modal -->
    <div id="map-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl h-[85vh] flex flex-col overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white z-10 shadow-sm">
                <h3 class="text-lg font-bold text-slate-800 flex items-center">
                    <i data-lucide="map" class="h-5 w-5 mr-2 text-rose-800"></i>
                    ค้นหาสถานที่และคำนวณระยะทางจริง
                </h3>
                <button id="btn-close-map" class="text-slate-400 hover:text-slate-600 transition-colors bg-slate-100 p-1.5 rounded-full">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>
            <div class="flex-1 relative w-full h-full bg-slate-100">
                <iframe id="map-iframe" class="w-full h-full border-none" sandbox="allow-scripts allow-same-origin"></iframe>
            </div>
            <div class="p-4 bg-slate-50 border-t border-slate-200 flex justify-end">
                <button type="button" id="btn-close-map-bottom" class="px-6 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 font-medium">ปิดหน้าต่างแผนที่</button>
            </div>
        </div>
    </div>

    <script>
        // 👇👇👇 นำ URL ของ Google Apps Script มาใส่ตรงนี้ 👇👇👇
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw9_j5MUH3MrBf1WvJ7vEJGsBTXtiAJSsRuXZ28TzSTMueV2L90WUjRlyut5Ii6vgVUlw/exec";

        // ==========================================
        // 🔒 ตั้งค่ารหัสผ่าน PIN ที่นี่
        // ==========================================
        const LOGIN_PIN = "8899";  // รหัสเข้าเว็บไซต์
        const ACTION_PIN = "2233"; // รหัสสำหรับแก้ไข/ลบ
        // ==========================================

        let state = {
            activeCategory: 'flatbed', 
            activeTab: 'overview',
            filterYear: null,
            filterMonth: null,
            filterPeriod: null,
            expandedTree: { 
                'flatbed_y2569': true, 'flatbed_y2569m4': true, 'flatbed_y2569m5': true, 'flatbed_y2569m6': true,
                'semidump_y2569': true, 'semidump_y2569m5': true, 'semidump_y2569m6': true 
            },
            trips: [],
            refuels: [],
            vehicles: [],
            jobs: [],
            editMode: false,
            formData: {},
            charts: {}
        };

        const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const formatCurrency = (num) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', minimumFractionDigits: 0 }).format(num || 0);
        const formatNumber = (num) => new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num || 0);
        
        const getToday = () => {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
        };

        const formatToThaiShort = (isoDate) => {
            if(!isoDate) return '';
            const parts = isoDate.split('-');
            if(parts.length !== 3) return isoDate;
            let y = parseInt(parts[0], 10);
            if (y < 2500) y += 543;
            return parseInt(parts[2], 10) + '/' + parseInt(parts[1], 10) + '/' + y;
        };

        const formatDisplayDate = (rawDate) => {
            if (!rawDate) return '-';
            const strDate = String(rawDate);
            if (strDate.includes('T')) {
                const d = new Date(strDate);
                if (!isNaN(d.getTime())) {
                    let y = d.getFullYear();
                    if (y >= 1900 && y < 2000) y = 2500 + (y % 100);
                    else if (y >= 2000 && y < 2500) y += 543;
                    return d.getDate() + '/' + (d.getMonth() + 1) + '/' + y;
                }
            }
            return strDate;
        };

        const reverseThaiToISO = (thaiDate) => {
            if(!thaiDate) return getToday();
            const strDate = String(thaiDate);
            if(strDate.includes('T')) {
                const d = new Date(strDate);
                if(!isNaN(d.getTime())) {
                    let y = d.getFullYear();
                    if (y >= 1900 && y < 2000) y = 2000 + (y % 100) - 43; 
                    else if (y > 2500) y -= 543;
                    return y + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                }
            }
            const parts = strDate.split('/');
            if(parts.length !== 3) return getToday();
            let y = parseInt(parts[2], 10);
            if(y > 2500) y -= 543;
            else if(y < 100) y = 2000 + y;
            const m = parts[1].padStart(2, '0');
            const d = parts[0].padStart(2, '0');
            return y + '-' + m + '-' + d;
        };

        // --- ระบบความปลอดภัย PIN ---
        window.pendingActionFunc = null;

        window.showPinModal = (type) => {
            const overlay = document.getElementById('pinOverlay');
            const input = document.getElementById('pinInput');
            const title = document.getElementById('pinTitle');
            const subtitle = document.getElementById('pinSubtitle');
            const cancelBtn = document.getElementById('pinCancelBtn');

            input.value = "";
            overlay.dataset.pinType = type;

            if (type === 'login') {
                title.innerText = "กรุณากรอกรหัส PIN";
                subtitle.innerText = "ระบุรหัส 4 หลักเพื่อเข้าใช้งานระบบ";
                cancelBtn.classList.add('hidden');
            } else {
                title.innerText = "ยืนยันตัวตน";
                subtitle.innerText = "กรุณากรอกรหัส PIN เพื่อแก้ไขหรือลบข้อมูล";
                cancelBtn.classList.remove('hidden');
            }

            overlay.classList.remove('hidden');
            setTimeout(() => input.focus(), 100);
        };

        window.handlePinInput = (val) => {
            const cleanVal = val.replace(/\D/g, '');
            const input = document.getElementById('pinInput');
            input.value = cleanVal;

            if (cleanVal.length === 4) {
                const type = document.getElementById('pinOverlay').dataset.pinType;
                const expected = (type === 'login') ? LOGIN_PIN : ACTION_PIN;

                setTimeout(() => {
                    if (cleanVal === expected) {
                        document.getElementById('pinOverlay').classList.add('hidden');
                        if (type === 'login') {
                            initApp(); 
                        } else if (window.pendingActionFunc) {
                            window.pendingActionFunc();
                            window.pendingActionFunc = null;
                        }
                    } else {
                        alert("รหัส PIN ไม่ถูกต้อง!");
                        input.value = "";
                        input.focus();
                    }
                }, 150);
            }
        };

        window.cancelActionPin = () => {
            document.getElementById('pinOverlay').classList.add('hidden');
            window.pendingActionFunc = null;
            document.getElementById('pinInput').value = "";
        };

        window.requestActionPin = (funcString) => {
            window.pendingActionFunc = new Function(funcString);
            showPinModal('action');
        };

        // --- ระบบ UI & Tree Navigation แยกหมวดหมู่ ---
        window.toggleTree = (key) => {
            state.expandedTree[key] = !state.expandedTree[key];
            renderNav();
        };

        window.changeTab = (category, tabId) => {
            state.activeCategory = category;
            state.activeTab = tabId;
            state.filterYear = null;
            state.filterMonth = null;
            state.filterPeriod = null;
            renderNav();
            renderContent();
        };

        window.changeTabPeriod = (category, tabId, year, month, period) => {
            state.activeCategory = category;
            state.activeTab = tabId;
            state.filterYear = year;
            state.filterMonth = month;
            state.filterPeriod = period;
            renderNav();
            renderContent();
        };

        const categories = [
            { id: 'flatbed', label: 'รถพื้นเรียบ', icon: 'truck' },
            { id: 'semidump', label: 'รถเซมิดั๊ม', icon: 'combine' }
        ];

        function renderNav() {
            const navMenu = document.getElementById('nav-menu');
            let html = '';

            categories.forEach(cat => {
                html += `<div class="mb-10">`;
                html += `
                    <h3 class="px-2 text-[17px] font-extrabold text-rose-900 mb-4 flex items-center">
                        <div class="bg-rose-100 p-1.5 rounded-lg mr-2"><i data-lucide="${cat.icon}" class="w-5 h-5 text-rose-800"></i></div>
                        ${cat.label}
                    </h3>
                `;
                
                const isOv = state.activeCategory === cat.id && state.activeTab === 'overview';
                html += `
                    <button onclick="changeTab('${cat.id}', 'overview')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all mb-4 ${isOv ? 'bg-rose-50 text-rose-900 font-bold shadow-sm' : 'text-slate-600 hover:bg-slate-100'}">
                        <i data-lucide="layout-dashboard" class="h-5 w-5"></i><span>ภาพรวม (Dashboard)</span>
                    </button>
                `;

                let treeYears = [];
                if (cat.id === 'semidump') {
                    treeYears = [
                        { year: 2569, startMonth: 5, endMonth: 12 }, 
                        { year: 2570, startMonth: 1, endMonth: 12 }
                    ];
                } else {
                    treeYears = [
                        { year: 2569, startMonth: 4, endMonth: 12 }, // เพิ่มเดือนเมษายน (เดือน 4) ของรถพื้นเรียบ
                        { year: 2570, startMonth: 1, endMonth: 12 }
                    ];
                }

                html += `<div class="space-y-1 mb-4 font-sans">`;
                treeYears.forEach(y => {
                    const yKey = `${cat.id}_y${y.year}`;
                    const isYOpen = state.expandedTree[yKey];
                    html += `
                        <div>
                            <button onclick="toggleTree('${yKey}')" class="flex items-center w-full text-left font-bold text-slate-700 px-2 py-2 hover:bg-slate-100 rounded-lg transition-colors text-[15px]">
                                <i data-lucide="${isYOpen ? 'chevron-down' : 'chevron-right'}" class="w-4 h-4 mr-2 text-slate-400"></i>
                                ปี ${y.year.toString().slice(-2)}
                            </button>
                    `;
                    if (isYOpen) {
                        html += `<div class="ml-4 border-l-2 border-slate-200 pl-3 mt-1 space-y-1">`;
                        for (let m = y.startMonth; m <= y.endMonth; m++) {
                            const mKey = `${cat.id}_y${y.year}m${m}`;
                            const isMOpen = state.expandedTree[mKey];
                            html += `
                                <div>
                                    <button onclick="toggleTree('${mKey}')" class="flex items-center w-full text-left font-semibold text-slate-600 px-2 py-1.5 hover:text-rose-800 hover:bg-rose-50 rounded-lg transition-colors text-[14px]">
                                        <i data-lucide="${isMOpen ? 'chevron-down' : 'chevron-right'}" class="w-4 h-4 mr-2 text-slate-400"></i>
                                        ${monthNames[m-1]}
                                    </button>
                            `;
                            if (isMOpen) {
                                html += `<div class="ml-4 border-l-2 border-slate-200 pl-4 mt-1 py-1 space-y-4 relative">`;

                                // Period 1
                                const p1TripsActive = state.activeCategory === cat.id && state.activeTab === 'trips' && state.filterYear === y.year && state.filterMonth === m && state.filterPeriod === 1;
                                const p1RefuelsActive = state.activeCategory === cat.id && state.activeTab === 'refuels' && state.filterYear === y.year && state.filterMonth === m && state.filterPeriod === 1;
                                html += `
                                    <div class="relative">
                                        <div class="absolute -left-4 top-2.5 w-4 border-t-2 border-slate-200"></div>
                                        <div class="text-[13px] font-bold text-slate-500 mb-1 ml-1">1-15 ${monthNames[m-1]}</div>
                                        <button onclick="changeTabPeriod('${cat.id}', 'trips', ${y.year}, ${m}, 1)" class="flex items-center w-full text-left px-3 py-1.5 rounded-lg mb-0.5 text-[13px] transition-colors ${p1TripsActive ? 'bg-rose-50 text-rose-900 font-bold' : 'text-slate-600 hover:bg-slate-100'}">
                                            <i data-lucide="map-pin" class="w-3.5 h-3.5 mr-2"></i>รายการวิ่งงาน
                                        </button>
                                        <button onclick="changeTabPeriod('${cat.id}', 'refuels', ${y.year}, ${m}, 1)" class="flex items-center w-full text-left px-3 py-1.5 rounded-lg text-[13px] transition-colors ${p1RefuelsActive ? 'bg-rose-50 text-rose-900 font-bold' : 'text-slate-600 hover:bg-slate-100'}">
                                            <i data-lucide="droplet" class="w-3.5 h-3.5 mr-2"></i>รายการเติมน้ำมัน
                                        </button>
                                    </div>
                                `;

                                // Period 2
                                const p2TripsActive = state.activeCategory === cat.id && state.activeTab === 'trips' && state.filterYear === y.year && state.filterMonth === m && state.filterPeriod === 2;
                                const p2RefuelsActive = state.activeCategory === cat.id && state.activeTab === 'refuels' && state.filterYear === y.year && state.filterMonth === m && state.filterPeriod === 2;
                                html += `
                                    <div class="relative">
                                        <div class="absolute -left-4 top-2.5 w-4 border-t-2 border-slate-200"></div>
                                        <div class="text-[13px] font-bold text-slate-500 mb-1 ml-1">16-สิ้นเดือน ${monthNames[m-1]}</div>
                                        <button onclick="changeTabPeriod('${cat.id}', 'trips', ${y.year}, ${m}, 2)" class="flex items-center w-full text-left px-3 py-1.5 rounded-lg mb-0.5 text-[13px] transition-colors ${p2TripsActive ? 'bg-rose-50 text-rose-900 font-bold' : 'text-slate-600 hover:bg-slate-100'}">
                                            <i data-lucide="map-pin" class="w-3.5 h-3.5 mr-2"></i>รายการวิ่งงาน
                                        </button>
                                        <button onclick="changeTabPeriod('${cat.id}', 'refuels', ${y.year}, ${m}, 2)" class="flex items-center w-full text-left px-3 py-1.5 rounded-lg text-[13px] transition-colors ${p2RefuelsActive ? 'bg-rose-50 text-rose-900 font-bold' : 'text-slate-600 hover:bg-slate-100'}">
                                            <i data-lucide="droplet" class="w-3.5 h-3.5 mr-2"></i>รายการเติมน้ำมัน
                                        </button>
                                    </div>
                                `;
                                html += `</div>`;
                            }
                            html += `</div>`;
                        }
                        html += `</div>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;

                const isJobs = state.activeCategory === cat.id && state.activeTab === 'jobs';
                const isVehicles = state.activeCategory === cat.id && state.activeTab === 'vehicles';
                html += `
                    <div class="border-t border-slate-100 pt-4 space-y-1">
                        <button onclick="changeTab('${cat.id}', 'jobs')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${isJobs ? 'bg-rose-50 text-rose-900 font-bold shadow-sm' : 'text-slate-600 hover:bg-slate-100'}">
                            <i data-lucide="map" class="h-5 w-5"></i><span>เส้นทางและเรทราคา</span>
                        </button>
                        <button onclick="changeTab('${cat.id}', 'vehicles')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${isVehicles ? 'bg-rose-50 text-rose-900 font-bold shadow-sm' : 'text-slate-600 hover:bg-slate-100'}">
                            <i data-lucide="users" class="h-5 w-5"></i><span>ข้อมูลรถและคนขับ</span>
                        </button>
                    </div>
                `;
                html += `</div>`;
            });

            navMenu.innerHTML = html;

            const catName = state.activeCategory === 'flatbed' ? 'รถพื้นเรียบ' : 'รถเซมิดั๊ม';
            const titleObj = {
                'overview': `ภาพรวมผลประกอบการ`, 
                'trips': `รายละเอียดการวิ่งงาน`, 
                'refuels': `ประวัติการเติมน้ำมัน`, 
                'jobs': `ฐานข้อมูลเส้นทางและเรทราคามาตรฐาน`, 
                'vehicles': `ข้อมูลรถและคนขับ`
            };

                btnAdd.classList.remove('flex');

            if (state.filterYear && state.filterMonth && state.filterPeriod) {
                const periodText = state.filterPeriod === 1 ? '1-15' : '16-สิ้นเดือน';
                subTitle.innerText = `(${periodText} ${monthNames[state.filterMonth - 1]} ${state.filterYear.toString().slice(-2)})`;

            }

        }

        function getFiltered(dataArr) {
            return dataArr.filter(item => {
                const itemCat = item.category || 'flatbed';
                if (itemCat !== state.activeCategory) return false;

                let matchPeriod = true;
                if (state.filterYear && state.filterMonth && state.filterPeriod && item.date) {
                    const dateStr = formatDisplayDate(item.date);
                    if (dateStr !== '-') {
                        const parts = dateStr.split('/');
                        if (parts.length === 3) {
                            const d = parseInt(parts[0], 10);
                            const m = parseInt(parts[1], 10);
                            let y = parseInt(parts[2], 10);
                            
                            // ปรับแก้กรณี Google Sheets ส่งข้อมูลกลับมาเป็นปี ค.ศ. (เช่น 2026) 
                            // ให้แปลงกลับเป็น พ.ศ. เสมอก่อนเข้าเงื่อนไข
                            if (y < 2500) y += 543;

                            const p = d <= 15 ? 1 : 2;
                            matchPeriod = (y === state.filterYear && m === state.filterMonth && p === state.filterPeriod);
                        } else { matchPeriod = false; }
                    } else { matchPeriod = false; }
                }
                return matchPeriod;
            });
        }

        function renderContent() {
            const container = document.getElementById('tab-content');
            container.innerHTML = ''; 
            if (state.activeTab === 'overview') renderOverview(container);
            else if (state.activeTab === 'trips') renderTrips(container);
            else if (state.activeTab === 'jobs') renderJobs(container);
            else if (state.activeTab === 'refuels') renderRefuels(container);
            else if (state.activeTab === 'vehicles') renderVehicles(container);
            lucide.createIcons();
        }

        function renderOverview(container) {
            const filteredTrips = getFiltered(state.trips);
            const filteredRefuels = getFiltered(state.refuels);

            const totalRevenue = filteredTrips.reduce((s, t) => s + Number(t.revenue || 0), 0);
            const totalProfit = filteredTrips.reduce((s, t) => s + Number(t.profit || 0), 0);
            const totalRefuelAmount = filteredRefuels.reduce((s, r) => s + Number(r.total || 0), 0);
            const totalWeight = filteredTrips.reduce((s, t) => s + Number(t.weight || 0), 0);
            const tripsCount = filteredTrips.length;

            const dataMap = {};
            filteredTrips.forEach(trip => {
                const formattedDate = formatDisplayDate(trip.date);
                const parts = String(formattedDate).split('/');
                if (parts.length === 3) {
                    const day = parseInt(parts[0], 10);
                    const monthStr = monthNames[parseInt(parts[1], 10) - 1] || parts[1];
                    const year = parts[2];
                    const periodLabel = day <= 15 ? 'วันที่ 1-15' : 'วันที่ 16-สิ้นเดือน';
                    const key = `${monthStr} ${year} (${periodLabel})`;
                    const order = parseInt(year) * 100 + parseInt(parts[1]) * 10 + (day <= 15 ? 1 : 2); 

                    if (!dataMap[key]) dataMap[key] = { name: key, กำไร: 0, ยอดรับ: 0, ค่าน้ำมัน: 0, order };
                    dataMap[key].กำไร += Number(trip.profit || 0);
                    dataMap[key].ยอดรับ += Number(trip.revenue || 0);
                    dataMap[key].ค่าน้ำมัน += Number(trip.fuelCost || 0);
                }
            });
            const profitByPeriod = Object.values(dataMap).sort((a, b) => a.order - b.order);

            let html = `
                <div class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 ${state.activeCategory === 'semidump' ? 'lg:grid-cols-5' : 'lg:grid-cols-4'} gap-6">

                            <div><p class="text-sm text-slate-500 font-medium">กำไรสุทธิรวม</p><p class="text-2xl font-bold text-slate-800">${formatCurrency(totalProfit)}</p></div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
                            <div class="bg-rose-100 p-4 rounded-xl text-rose-800"><i data-lucide="truck" class="h-8 w-8"></i></div>
                            <div><p class="text-sm text-slate-500 font-medium">ยอดรับสุทธิรวม</p><p class="text-2xl font-bold text-slate-800">${formatCurrency(totalRevenue)}</p></div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">

                            <div><p class="text-sm text-slate-500 font-medium">ยอดจ่ายค่าน้ำมันรวม</p><p class="text-2xl font-bold text-slate-800">${formatCurrency(totalRefuelAmount)}</p></div>
                        </div>

                            <div><p class="text-sm text-slate-500 font-medium">จำนวนเที่ยววิ่ง</p><p class="text-2xl font-bold text-slate-800">${tripsCount} <span class="text-base font-normal">เที่ยว</span></p></div>
                        </div>
                        ${state.activeCategory === 'semidump' ? `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
                            <div class="bg-amber-100 p-4 rounded-xl text-amber-600"><i data-lucide="package" class="w-8 h-8"></i></div>
                            <div><p class="text-sm text-slate-500 font-medium">น้ำหนักบรรทุกรวม</p><p class="text-2xl font-bold text-slate-800">${formatNumber(totalWeight).replace(/\.00$/, '')} <span class="text-base font-normal">ตัน</span></p></div>
                        </div>

                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">

                    </div>

                <div class="space-y-6">
            `;

            if (state.activeCategory === 'semidump' && data.length > 0) {

        function drawCharts(profitData) {
            if(state.charts.bar) state.charts.bar.destroy();
            if(state.charts.line) state.charts.line.destroy();

            const labels = profitData.map(d => d.name);
            const profit = profitData.map(d => d.กำไร);
            const fuel = profitData.map(d => d.ค่าน้ำมัน);
            const revenue = profitData.map(d => d.ยอดรับ);

            const ctxBar = document.getElementById('chartBar').getContext('2d');
            state.charts.bar = new Chart(ctxBar, {
                type: 'bar',
                data: { labels: labels, datasets: [ { label: 'กำไร', data: profit, backgroundColor: '#10b981', borderRadius: 4 }, { label: 'ค่าน้ำมัน', data: fuel, backgroundColor: '#f97316', borderRadius: 4 } ] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true } } }
            });

            const ctxLine = document.getElementById('chartLine').getContext('2d');
            state.charts.line = new Chart(ctxLine, {
                type: 'line',
                data: { labels: labels, datasets: [ { label: 'ยอดรับ', data: revenue, borderColor: '#9f1239', backgroundColor: '#9f1239', tension: 0.3, borderWidth: 3 }, { label: 'กำไร', data: profit, borderColor: '#10b981', backgroundColor: '#10b981', tension: 0.3, borderWidth: 3 } ] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true } } }
            });
        }

            // ใช้ setTimeout เพื่อให้แน่ใจว่าฟอร์มเรนเดอร์ใน DOM เรียบร้อยก่อนสั่งคำนวณอัตโนมัติ
            setTimeout(() => {
                if(state.activeTab === 'refuels') calcTotalRefuel(); 
                if(state.activeTab === 'jobs' || state.activeTab === 'trips') calcFuelCost(); 
            }, 100);
        }

        document.getElementById('btn-close-modal').onclick = () => document.getElementById('main-modal').classList.add('hidden');

        document.getElementById('btn-add-new').onclick = () => {
            state.formData = {}; 
            openFormModal(false);
        };

        window.openEditModal = (id, tab) => {
            const list = state[tab];
            const item = list.find(i => i.id == id);
            if (item) {
                state.formData = { ...item };
                if (state.formData.date) state.formData.date = reverseThaiToISO(state.formData.date);
                openFormModal(true);
            }
        };

        window.applyJobSelection = () => {
            const sel = document.getElementById('job_select');
            const opt = sel.options[sel.selectedIndex];
            if(opt && opt.value) {
                document.getElementById('f_origin').value = opt.getAttribute('data-ori') || '';
                document.getElementById('f_dest').value = opt.getAttribute('data-dest') || '';
                document.getElementById('f_dist').value = opt.getAttribute('data-dist') || '';
                document.getElementById('f_revenue').value = opt.getAttribute('data-rev') || '';
                
                if(document.getElementById('f_fuelRate')) {
                    const rate = parseFloat(opt.getAttribute('data-fuelrate'));
                    document.getElementById('f_fuelRate').value = (!isNaN(rate) && rate > 0) ? rate : 2.5;
                }
                if(document.getElementById('f_currentFuelPrice')) {
                    const price = parseFloat(opt.getAttribute('data-fuelprice'));
                    document.getElementById('f_currentFuelPrice').value = (!isNaN(price) && price > 0) ? price : 36.0;
                }
                if(document.getElementById('f_driverFee')) {
                    const fee = parseFloat(opt.getAttribute('data-driverfee'));
                    document.getElementById('f_driverFee').value = !isNaN(fee) ? fee : 0;
                }

                calcFuelCost(); 
            }
        };

        window.calcFuelCost = () => {
            const distInput = document.getElementById('f_dist');
            const rateInput = document.getElementById('f_fuelRate');
            const priceInput = document.getElementById('f_currentFuelPrice');
            const costInput = document.getElementById('f_fuelCost');

            if(distInput && rateInput && priceInput && costInput) {
                const dist = parseFloat(distInput.value) || 0;
                const rate = parseFloat(rateInput.value) || 0;
                const price = parseFloat(priceInput.value) || 0;
                
                if (dist > 0 && rate > 0 && price > 0) {
                    costInput.value = (((dist * 2) / rate) * price).toFixed(2);
                } else {
                    costInput.value = 0;
                }
            }
        };

        window.calcTotalRefuel = () => {
            const liters = parseFloat(document.getElementById('f_liters')?.value);
            const price = parseFloat(document.getElementById('f_price')?.value);
            const estDiv = document.getElementById('refuel_estimate');
            if(estDiv && !isNaN(liters) && !isNaN(price)) {
                estDiv.classList.remove('hidden');
                estDiv.innerText = 'ยอดรวมประเมิน: ' + formatCurrency(liters * price);
            } else if(estDiv) {
                estDiv.classList.add('hidden');
            }
        };

        window.autoCalcDistance = async () => {
            const ori = document.getElementById('f_origin').value;
            const dest = document.getElementById('f_dest').value;
            const btn = document.getElementById('btn-calc-dist');
            if(!ori || !dest) return alert('กรุณากรอกต้นทางและปลายทางก่อนครับ');

            btn.innerHTML = '<i data-lucide="loader" class="w-3 h-3 mr-1 spinner"></i>กำลังคำนวณ...';
            lucide.createIcons();
            
            try {
                const geocode = async (query) => {
                    const match = query.match(/(-?[\d\.]+)\s*,\s*(-?[\d\.]+)/);
                    if (match) return { lat: match[1], lon: match[2] };
                    const res = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query) + '&limit=1&countrycodes=th');
                    const data = await res.json();
                    if(data && data.length > 0) return data[0];
                    throw new Error("ไม่พบสถานที่");
                };
                const [o, d] = await Promise.all([geocode(ori), geocode(dest)]);
                const osrmRes = await fetch('https://router.project-osrm.org/route/v1/driving/' + o.lon + ',' + o.lat + ';' + d.lon + ',' + d.lat + '?overview=false');
                const osrmData = await osrmRes.json();
                
                if(osrmData.code === 'Ok') {
                    document.getElementById('f_dist').value = (osrmData.routes[0].distance / 1000).toFixed(0);
                    calcFuelCost(); 
                } else throw new Error("คำนวณไม่ได้");
            } catch (e) {
                alert("เกิดข้อผิดพลาด: " + e.message);
            } finally {
                btn.innerHTML = '<i data-lucide="map-pin" class="w-3 h-3 mr-1"></i>คำนวณอัตโนมัติ';
                lucide.createIcons();
            }
        };

        async function submitData(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-form');
            btn.disabled = true;
            btn.innerText = 'กำลังบันทึก...';

            let newData = { 
                id: state.editMode ? state.formData.id : Date.now(),
                category: state.editMode ? (state.formData.category || state.activeCategory) : state.activeCategory 
            };
            const getVal = (id) => document.getElementById(id)?.value;

            if (state.activeTab === 'trips' || state.activeTab === 'refuels') {
                newData.date = formatToThaiShort(getVal('f_date'));
                
                // ดึงค่าจากช่องทะเบียนรถ แล้วตัดเอาเฉพาะส่วนทะเบียน (ซ่อนชื่อคนขับก่อนส่งเข้าฐานข้อมูล)
                let rawPlate = getVal('f_plate') || '';
                if (rawPlate.includes(' (')) {
                    rawPlate = rawPlate.split(' (')[0].trim();
                }
                newData.plate = rawPlate;
            }

            let actionType = '';
            if (state.activeTab === 'trips') {
                actionType = state.editMode ? 'editTrip' : 'addTrip';
                Object.assign(newData, {
                    origin: getVal('f_origin'), dest: getVal('f_dest'),
                    dist: Number(getVal('f_dist')), 
                    fuelRate: Number(getVal('f_fuelRate') || 0), 
                    currentFuelPrice: Number(getVal('f_currentFuelPrice') || 0), 
                    fuelCost: Number(getVal('f_fuelCost') || 0),
                    driverFee: Number(getVal('f_driverFee') || 0), 
                    revenue: Number(getVal('f_revenue')),
                    weight: state.activeCategory === 'semidump' ? Number(getVal('f_weight') || 0) : 0
                });
                newData.profit = newData.revenue - newData.fuelCost - newData.driverFee;
                if(state.editMode) state.trips = state.trips.map(t => t.id === newData.id ? newData : t);
                else state.trips.unshift(newData);
            } else if (state.activeTab === 'refuels') {
                actionType = state.editMode ? 'editRefuel' : 'addRefuel';
                Object.assign(newData, { liters: Number(getVal('f_liters')), price: Number(getVal('f_price')) });
                newData.total = newData.liters * newData.price;
                if(state.editMode) state.refuels = state.refuels.map(r => r.id === newData.id ? newData : r);
                else state.refuels.unshift(newData);
            } else if (state.activeTab === 'vehicles') {
                actionType = state.editMode ? 'editVehicle' : 'addVehicle';
                Object.assign(newData, { plate: getVal('f_plate'), driver: getVal('f_driver'), type: getVal('f_type') });
                if(state.editMode) state.vehicles = state.vehicles.map(v => v.id === newData.id ? newData : v);
                else state.vehicles.unshift(newData);
            } else if (state.activeTab === 'jobs') {
                actionType = state.editMode ? 'editJob' : 'addJob';
                Object.assign(newData, { 
                    origin: getVal('f_origin'), dest: getVal('f_dest'), 
                    dist: Number(getVal('f_dist')), revenue: Number(getVal('f_revenue')),
                    fuelRate: Number(getVal('f_fuelRate') || 0), 
                    currentFuelPrice: Number(getVal('f_currentFuelPrice') || 0), 
                    fuelCost: Number(getVal('f_fuelCost') || 0),
                    driverFee: Number(getVal('f_driverFee') || 0) 
                });
                if(state.editMode) state.jobs = state.jobs.map(j => j.id === newData.id ? newData : j);
                else state.jobs.unshift(newData);
            }

            if(GAS_WEB_APP_URL && !GAS_WEB_APP_URL.includes("ใส่_URL")) {
                try {
                    fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: actionType, data: newData }),
                        mode: 'no-cors'
                    });
                } catch(e) {}
            }

            document.getElementById('main-modal').classList.add('hidden');
            renderNav();
            renderContent();
            btn.disabled = false;
        }

        window.deleteData = async (id, actionStr, sheetType) => {
            if (!confirm("คุณต้องการลบข้อมูลแถวนี้ใช่หรือไม่?")) return;
            
            document.getElementById('loading-spinner').classList.remove('hidden');
            try {
                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: actionStr, id: id, sheetType: sheetType })
                });
                
                if (actionStr.includes('Trip')) state.trips = state.trips.filter(i => i.id !== id);
                else if (actionStr.includes('Refuel')) state.refuels = state.refuels.filter(i => i.id !== id);
                else if (actionStr.includes('Vehicle')) state.vehicles = state.vehicles.filter(i => i.id !== id);
                else if (actionStr.includes('Job')) state.jobs = state.jobs.filter(i => i.id !== id);

                renderNav();
                renderContent();
                alert("ลบข้อมูลสำเร็จ!");
            } catch (e) {
                console.error(e);
                alert("เกิดข้อผิดพลาดในการลบข้อมูล");
            } finally {
                document.getElementById('loading-spinner').classList.add('hidden');
            }
        };

        window.openMapModal = () => {
            const mapHtml = `
                <!DOCTYPE html><html lang="th"><head><meta charset="utf-8">
                <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
                <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
                <style>body, html, #map { height: 100%; margin: 0; padding: 0; font-family: sans-serif; } .search-panel { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; } input, button { padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; outline:none; } button { background: #9f1239; color: white; border: none; cursor: pointer; font-weight: bold; } #status { font-size: 12px; text-align: center; }</style>
                </head><body>
                <div class="search-panel"><label style="font-size:12px;font-weight:bold;color:#475569;">📍 ต้นทาง</label><input type="text" id="ori" placeholder="เช่น สระบุรี หรือ 13.7,100.5"><label style="font-size:12px;font-weight:bold;color:#475569;">🎯 ปลายทาง</label><input type="text" id="dest" placeholder="เช่น ระยอง"><button id="calcBtn">ค้นหาและคำนวณระยะทาง</button><div id="status"></div></div><div id="map"></div>
                <script>
                const map = L.map("map").setView([13.75, 100.5], 6);
                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
                let routeLayer = null, markers = [];
                async function geocode(q) {
                    const m = q.match(/([\\d\\.]+)\\s*,\\s*([\\d\\.]+)/);
                    if (m) return { lat: parseFloat(m[1]), lon: parseFloat(m[2]) };
                    const r = await fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(q) + "&limit=1&countrycodes=th");
                    const d = await r.json();
                    if (d && d.length > 0) return d[0];
                    throw new Error("ไม่พบสถานที่");
                }
                document.getElementById("calcBtn").onclick = async function() {
                    const ori = document.getElementById("ori").value;
                    const dest = document.getElementById("dest").value;
                    const statusEl = document.getElementById("status");
                    if(!ori || !dest) return statusEl.innerText = "กรุณากรอกข้อมูลให้ครบ", statusEl.style.color="red";
                    statusEl.innerText = "กำลังค้นหา..."; statusEl.style.color="#9f1239"; this.disabled = true;
                    try {
                        const [o, d] = await Promise.all([geocode(ori), geocode(dest)]);
                        if(markers.length) { markers.forEach(m=>map.removeLayer(m)); markers=[]; }
                        if(routeLayer) map.removeLayer(routeLayer);
                        markers.push(L.marker([o.lat, o.lon]).addTo(map).bindPopup("ต้นทาง").openPopup());
                        markers.push(L.marker([d.lat, d.lon]).addTo(map).bindPopup("ปลายทาง"));
                        statusEl.innerText = "กำลังดึงเส้นทาง...";
                        const res = await fetch("https://router.project-osrm.org/route/v1/driving/" + o.lon + "," + o.lat + ";" + d.lon + "," + d.lat + "?overview=full&geometries=geojson");
                        const data = await res.json();
                        if(data.code === "Ok") {
                            const dist = (data.routes[0].distance / 1000).toFixed(0);
                            routeLayer = L.geoJSON(data.routes[0].geometry, {style: {color: "#9f1239", weight: 5}}).addTo(map);
                            map.fitBounds(routeLayer.getBounds(), {padding:[50,50]});
                            statusEl.innerText = "ระยะทาง: " + dist + " กม. (กำลังส่งข้อมูลกลับ)";
                            statusEl.style.color = "green";
                            setTimeout(() => { window.parent.postMessage({ type: "MAP_SELECTED", dist: dist, origin: ori, dest: dest }, "*"); }, 1500);
                        } else throw new Error("ไม่พบเส้นทาง");
                    } catch(e) { statusEl.innerText = e.message; statusEl.style.color="red"; }
                    this.disabled = false;
                };
                <\/script></body></html>
            `;
            document.getElementById('map-iframe').srcdoc = mapHtml;
            document.getElementById('map-modal').classList.remove('hidden');
        };

        const closeMapModal = () => document.getElementById('map-modal').classList.add('hidden');
        document.getElementById('btn-close-map').onclick = closeMapModal;
        document.getElementById('btn-close-map-bottom').onclick = closeMapModal;

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'MAP_SELECTED') {
                document.getElementById('f_dist').value = event.data.dist;
                document.getElementById('f_origin').value = event.data.origin;
                document.getElementById('f_dest').value = event.data.dest;
                calcFuelCost();
                closeMapModal();
            }
        });

        async function initApp() {
            renderNav();
            if(!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("ใส่_URL")) return;

            try {
                document.getElementById('loading-spinner').classList.remove('hidden');
                // เพิ่ม timestamp ต่อท้าย URL ป้องกันปัญหา Browser Cache จำข้อมูลเก่า
                const res = await fetch(GAS_WEB_APP_URL + "?t=" + new Date().getTime());
                const data = await res.json();
                if(data.status === 'success') {
                    state.trips = data.trips || [];
                    state.refuels = data.refuels || [];
                    state.vehicles = data.vehicles || [];
                    state.jobs = data.jobs || [];
                    renderNav();
                    renderContent();
                }
            } catch (e) { console.error("Load error", e); }
            finally {
                document.getElementById('loading-spinner').classList.add('hidden');
            }
        }

        // เริ่มต้นการทำงาน: แสดงหน้า PIN Login เป็นอันดับแรก
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            showPinModal('login');
        });
    </script>
</body>
